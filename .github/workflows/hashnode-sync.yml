name: Sync Hashnode Blogs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install feedparser

      - name: Fetch blogs from RSS
        run: |
          python3 <<EOF
import feedparser
import os

feed = feedparser.parse("https://bsaha.hashnode.dev/rss.xml")

os.makedirs("blogs", exist_ok=True)

print(f"Total posts found: {len(feed.entries)}")

for entry in feed.entries:
    title = entry.title
    slug = entry.link.split("/")[-1]
    content = entry.get("summary", "")

    filename = f"blogs/{slug}.md"

    print(f"Creating file: {filename}")

    with open(filename, "w", encoding="utf-8") as f:
        f.write(f"# {title}\n\n")
        f.write(content)

EOF

      - name: Commit blog files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add blogs
          git commit -m "Auto sync Hashnode blogs via RSS" || echo "No changes"

          git push
