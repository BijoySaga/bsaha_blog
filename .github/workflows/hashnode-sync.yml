name: Sync Hashnode Blogs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch posts from Hashnode
        run: |
          curl https://gql.hashnode.com \
          -H "Authorization: ${{ secrets.HASHNODE_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"query":"{ me { posts(page:0){ title slug contentMarkdown } } }"}' \
          > posts.json

      - name: Install jq
        run: sudo apt-get install jq

      - name: Convert posts to markdown files
        run: |
          mkdir -p blogs
          jq -c '.data.me.posts[]' posts.json | while read post; do
            title=$(echo $post | jq -r '.title')
            slug=$(echo $post | jq -r '.slug')
            content=$(echo $post | jq -r '.contentMarkdown')

            echo "# $title" > blogs/$slug.md
            echo "" >> blogs/$slug.md
            echo "$content" >> blogs/$slug.md
          done

      - name: Commit blog files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add blogs
          git commit -m "Sync Hashnode blogs" || echo "No changes"
          git push
