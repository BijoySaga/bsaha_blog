name: Sync Hashnode Blogs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch posts from Hashnode
        run: |
          curl https://gql.hashnode.com \
          -H "Authorization: ${{ secrets.HASHNODE_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"query":"{ publication(host:\"hashnode.com\") { posts(first:20) { edges { node { title slug contentMarkdown } } } } }"}' \
          > posts.json

          echo "----- HASHNODE RESPONSE -----"
          cat posts.json

      - name: Convert posts to markdown files
        run: |
          mkdir -p blogs
          jq -c '.data.publication.posts.edges[].node' posts.json | while read post; do
            title=$(echo $post | jq -r '.title')
            slug=$(echo $post | jq -r '.slug')
            content=$(echo $post | jq -r '.contentMarkdown')

            echo "# $title" > blogs/$slug.md
            echo "" >> blogs/$slug.md
            echo "$content" >> blogs/$slug.md
          done

      - name: Commit blog files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add blogs

          git commit -m "Auto sync Hashnode blogs" || echo "No changes to commit"

          git push
