name: Sync Hashnode Blogs

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch posts from Hashnode
        run: |
          curl https://gql.hashnode.com \
          -H "Authorization: ${{ secrets.HASHNODE_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"query":"{ me { posts(page:0){ title slug contentMarkdown } } }"}' \
          > posts.json

      - name: Show fetched posts
        run: cat posts.json
