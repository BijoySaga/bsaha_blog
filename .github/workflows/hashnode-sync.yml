name: Sync Hashnode Blogs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch posts from Hashnode
        run: |
          curl https://gql.hashnode.com \
          -H "Content-Type: application/json" \
          -d '{"query":"{ user(username:\"bsaha\") { posts(page:0) { nodes { title slug contentMarkdown } } } }"}' \
          > posts.json

          echo "========== HASHNODE RESPONSE =========="
          cat posts.json

      - name: Convert posts to markdown files
        run: |
          mkdir -p blogs

          count=$(jq '.data.user.posts.nodes | length' posts.json)

          echo "Total posts found: $count"

          if [ "$count" -eq 0 ]; then
            echo "❌ No posts found"
            exit 1
          fi

          jq -c '.data.user.posts.nodes[]' posts.json | while read post; do
            title=$(echo $post | jq -r '.title')
            slug=$(echo $post | jq -r '.slug')
            content=$(echo $post | jq -r '.contentMarkdown')

            file="blogs/$slug.md"

            echo "Creating file: $file"

            echo "# $title" > "$file"
            echo "" >> "$file"
            echo "$content" >> "$file"
          done

          echo "Files created:"
          ls -la blogs

      - name: Commit blog files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add blogs

          git commit -m "Auto sync Hashnode blogs" || echo "No changes to commit"

          git push
